            <h1 class="page-hero-title chip-title"><span>Architecture</span></h1>
          </div>

          <p class="lead pb-2"><span class="underline">A chronological style sampler</span></p>

          <section class="architecture-sampler" id="architecture-sampler" data-style="coptic">
            <div class="architecture-controls" aria-label="Architectural styles"></div>

            <figure class="architecture-figure">
              <figcaption class="architecture-image-title" id="architecture-building"></figcaption>
              <img id="architecture-image" src="" alt="" />
              <figcaption>
                <span class="architecture-gallery-controls">
                  <button id="architecture-prev" type="button" aria-label="Previous architecture image">&larr;</button>
                  <span id="architecture-image-count"></span>
                  <button id="architecture-next" type="button" aria-label="Next architecture image">&rarr;</button>
                </span>
                <a id="architecture-source" href="#" target="_blank" rel="noopener noreferrer">image source</a>
              </figcaption>
            </figure>

            <div class="architecture-copy">
              <span class="architecture-era" id="architecture-era"></span>
              <h2 id="architecture-title"></h2>
              <p id="architecture-description"></p>
              <p class="architecture-note" id="architecture-note"></p>
            </div>

            <ul class="architecture-details" id="architecture-details" aria-label="Style cues"></ul>
          </section>
        </div>
