<!DOCTYPE html>
<html lang="en-us" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta
    name="description"
    content="Three.js 3D present-to-past timeline demo for Alex Kurkar."
  />
  <meta property="og:title" content="3D Timeline Demo | Alex Kurkar" />
  <meta property="og:type" content="website" />
  <title>3D Timeline Demo | Alex Kurkar</title>
  <link rel="icon" type="image/png" href="../image.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,500..800&family=Red+Hat+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="assets/three-scroll-demo.css" />
</head>
<body>
  <main class="tsd-shell" id="tsd-shell">
    <section class="tsd-stage" id="tsd-stage" tabindex="0" aria-label="One-point perspective present-to-past timeline">
      <canvas id="tsd-scene" class="tsd-scene" aria-hidden="true"></canvas>
      <canvas id="tsd-hyperspace" class="tsd-hyperspace" aria-hidden="true"></canvas>
      <div class="tsd-overlays" id="tsd-overlays" aria-live="polite"></div>
      <div class="tsd-hud" aria-hidden="true">
        <span id="tsd-depth">2026</span>
        <div><span id="tsd-fill"></span></div>
        <span id="tsd-index">01 / 12</span>
      </div>
      <div class="tsd-controls" aria-label="Timeline controls">
        <button id="tsd-prev" type="button" aria-label="Move toward present">&uarr;</button>
        <button id="tsd-next" type="button" aria-label="Move toward past">&darr;</button>
      </div>
    </section>
  </main>

  <script type="module" src="assets/perspective-timeline-v2.js"></script>
</body>
</html>
